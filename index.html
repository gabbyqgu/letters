<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" /> <!--basically  allows emojis/symbols to display correctly-->
    <title>open me when...</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!--======= HOME PAGE =========-->
    <div id="home">
        <!--background layer-->
        <img id="background" src="homepage/background.png" alt="background" />
        <!--the rest of the elements :P-->
        <img class="decor lace"  
            src="homepage/lace.png" /> <!-- layers BELOW everything else-->
        <img class="decor bottom-corner"
            src="homepage/bottom-corner.png" />
        <img class="decor right-corner"
            src="homepage/right-corner.png" />
        <img class="decor birthday-text"
            src="homepage/birthday-text.png" />
        <img class="decor text" 
            src="homepage/text.png" /> <!--adds to both 'text' and 'decor' class-->
        <img class="decor draggable bear-hug"
            src="homepage/bear-hug.png" />
        <img class="decor draggable camera"
            src="homepage/camera.png" />
        <img class="decor draggable cat"
            src="homepage/cat.png" /> 
        <img class="decor draggable hamster"
            src="homepage/hamster.png" />
    

    </div>

    <script src="script.js"></script>

</body>
</html>
